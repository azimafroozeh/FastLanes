# .github/workflows/galp.yml

name: GALP

run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:

permissions:
  contents: read

jobs:
  president-build-test:
    if: ${{ github.actor == 'azimafroozeh' }}
    name: CMake CI on president
    runs-on:
      - self-hosted
      - Linux
      - X64
      - president

    steps:
      # ──────────────────────────────
      # 0. Checkout
      # ──────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ──────────────────────────────
      # 1. Quick sanity of the runner
      # ──────────────────────────────
      - name: 🔎 Env dump
        run: |
          set -x
          hostname
          echo "Runner label: president"
          echo "CUDA path: $CUDA_LIBRARY_PATH"
          echo "NVCOMP_INC: $NVCOMP_INC"
          echo "NVCOMP_LIB: $NVCOMP_LIB"
          which nvidia-smi || true
          which nvcc       || true
          which $CLANG_PATH || true
          which $GCC_PATH   || true
          which cmake      || true

      - name: ✅ Verify tools
        run: |
          for cmd in nvidia-smi nvcc $CLANG_PATH $GCC_PATH cmake; do
            command -v "$cmd" >/dev/null || { echo "::error::$cmd missing"; exit 127; }
          done
          nvidia-smi
          nvcc   --version
          $CLANG_PATH --version
          $GCC_PATH   --version
          cmake  --version

      # ──────────────────────────────
      # 2. Configure with CMake
      # ──────────────────────────────
      - name: 🔄 CMake configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_BUILD_GALP=ON

      # ──────────────────────────────
      # 3. Build (all targets)
      # ──────────────────────────────
      - name: 🏗️ Build
        run: |
          cmake --build build --parallel

      # ──────────────────────────────
      # 4. Run unit tests
      # ──────────────────────────────
      - name: 🧪 Run tests
        run: |
          cd build
          ctest --output-on-failure

      # ──────────────────────────────
      # 5. Run benchmarks
      #    (benchmarks are tagged with LABEL "benchmark")
      # ──────────────────────────────
      - name: ⚡ Run benchmarks
        run: |
          cd build
          ctest

      # ──────────────────────────────
      # 6. Smoke‑test helper binaries
      # ──────────────────────────────
      - name: 🚀 Smoke‑test binaries
        run: |
          ./build/bin/micro-benchmarks       --help
          ./build/bin/compressors-benchmarks --help
