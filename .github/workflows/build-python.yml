name: Build & Test Python Bindings

on:
  push:  # Triggers on push to any branch
  pull_request:
    branches: [ main, dev ]  # PRs targeting these branches

jobs:
  build-test-python:
    name: Build and test Python bindings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FastLanes
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core pybind11 setuptools_scm pytest

      - name: Install Python bindings (editable)
        run: |
          pip install -e . --no-build-isolation --config-settings=editable.mode=inplace

      - name: Run Python tests
        run: |
          pytest -q python/tests
