name: Build, Test & Publish Python Bindings
run-name: "${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})"

on:
  push:
  pull_request:
    branches: [ main, dev ]

jobs:
  # ------------------------------------------------------------
  # 1. Build and Test Python bindings using Makefile
  # ------------------------------------------------------------
  build-test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FastLanes
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install scikit-build-core build wheel pytest

      - name: Build & Test via Makefile
        run: |
          source .venv/bin/activate
          make rebuild_python_release
          make test_python

  # ------------------------------------------------------------
  # 2. Build the wheel and upload it as an artifact
  # ------------------------------------------------------------
  build-wheel:
    runs-on: ubuntu-latest
    needs: build-test-python

    steps:
      - name: Checkout FastLanes
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wheel build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core build wheel

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastlanes-wheel
          path: dist/*.whl

  # ------------------------------------------------------------
  # 3. Publish the wheel to PyPI (only on push to main)
  # ------------------------------------------------------------
  publish-wheel:
    runs-on: ubuntu-latest
    needs: build-wheel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: fastlanes-wheel
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist
          skip-existing: true
