name: Test Publish to TestPyPI

on:
  push: # Run on push to any branch
    branches: [ "**" ]

jobs:
  # build-test-python:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Skipped
  #       run: echo "Build & test skipped for publishing test"

  # build-wheel:
  #   runs-on: ubuntu-latest
  #   needs: build-test-python
  #   steps:
  #     - name: Skipped
  #       run: echo "Wheel build skipped for publishing test"

  publish-wheel:
    runs-on: ubuntu-latest
    # needs: build-wheel  # Skipped for isolated test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repo (required for artifact path)
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: fastlanes-wheel
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          packages-dir: dist
          skip-existing: true
