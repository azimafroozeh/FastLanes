name: Build & Test Python Bindings
run-name: "${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})"

on:
  push:
  pull_request:
    branches: [ main, dev ]

jobs:
  build-test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FastLanes
        uses: actions/checkout@v4

      - name: Set up system Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core build

      - name: Build Python bindings
        run: make rebuild_python_release

      - name: Run Python tests
        run: make test_python

