name: Discord Notify

on:
  push:                     # validate JSON on every commit
  pull_request_target: # full workflow when a PR to dev is closed
    types: [ closed ]
    branches: [ dev ]

jobs:
  build-json:
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.build.outputs.json }}

    steps:
      - uses: actions/checkout@v3

      - name: Build message JSON
        id: build
        shell: bash
        run: |
          set -eo pipefail

          if [[ "${{ github.event_name }}" == "pull_request_target" && "${{ github.event.action }}" == "closed" ]]; then
            # ----------  metadata for a merged PR ----------
            MERGER=$(jq -r '.pull_request.merged_by.login' < "$GITHUB_EVENT_PATH")
            PR_NUMBER=$(jq -r '.pull_request.number'       < "$GITHUB_EVENT_PATH")
            PR_TITLE=$(jq -r '.pull_request.title'         < "$GITHUB_EVENT_PATH")
            PR_URL=$(jq -r '.pull_request.html_url'        < "$GITHUB_EVENT_PATH")
            BASE_REF=$(jq -r '.pull_request.base.ref'      < "$GITHUB_EVENT_PATH")

            # build a multi-line Discord message (no heredoc needed)
            printf -v MSG '%s\n%s\n%s' \
              "📦 PR #${PR_NUMBER} merged into **${BASE_REF}** by **${MERGER}**" \
              "**${PR_TITLE}**" \
              "${PR_URL}"
          else
            # ----------  metadata for a direct push ----------
            SHORT_SHA=${GITHUB_SHA::7}
            AUTHOR=$(git show -s --format='%an' "$GITHUB_SHA")
            REF_NAME=${GITHUB_REF#refs/heads/}
            COMMIT_URL="https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}"

            printf -v MSG '%s\n%s' \
              "✏️ Commit **${SHORT_SHA}** pushed to **${REF_NAME}** by **${AUTHOR}**" \
              "${COMMIT_URL}"
          fi

          # wrap in compact JSON and expose as job output
          JSON=$(jq -n -c --arg content "$MSG" '{content:$content}')
          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Validate JSON
        run: echo "${{ steps.build.outputs.json }}" | jq -e '.'

  notify-discord:
    needs: build-json
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        run: |
          curl -s -X POST \
               -H "Content-Type: application/json" \
               -d '${{ needs.build-json.outputs.json }}' \
               '${{ secrets.DISCORD_WEBHOOK_URL }}'
