name: Quick-Fuzz CI
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) —
  ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  pull_request:
    branches: [ dev ]
    paths:
      - '**/*.cpp'
      - 'test/src/quick_fuzz_tests/fuzz_config.json'
      - '.github/workflows/quick-fuzz.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout PR head
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      # 2) Toolchain
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build jq

      # 3) Configure
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DFLS_BUILD_TESTING=ON

      # 4) Build
      - name: Build
        run: cmake --build build -- -j$(nproc)

      # 5) Run Quick-Fuzz  (NO continue-on-error)
      - name: Run Quick-Fuzz
        run: |
          set -o pipefail
          ctest --test-dir build \
                -R quick_fuzz_test \
                --parallel $(nproc) \
                --output-on-failure \
                -V | tee ctest.log

      # 6) Upload artefacts if any previous step failed
      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quick-fuzz-failure-${{ github.run_id }}
          path: |
            tmp/fls_quick_fuzz/**
            ctest.log

      # 7) Comment on PR when Quick-Fuzz failed
      - name: Comment on failure
        if: failure() &&
          github.event_name == 'pull_request' &&
          github.base_ref == 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          RUN=${{ github.run_id }}
          CONFIG='test/src/quick_fuzz_tests/fuzz_config.json'
          ARTIFACTS="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN}/artifacts"
          SCHEMA="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/${CONFIG}"
          SNIP=$(tail -n 20 ctest.log)
          
          gh pr comment "$PR" --body "$(printf '%s\n' \
            '## ❌ Quick-Fuzz CI Failed' '' \
            "**Download artefacts:** [Logs & CSV](${ARTIFACTS})" '' \
            "**Fuzz config:** [${CONFIG}](${SCHEMA})" '' \
            '**Last 20 lines of test log:**' '```' "${SNIP}" '```')"
