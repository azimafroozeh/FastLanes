name: Quick-Fuzz CI
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) — 
  ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
    branches: [ '**' ]
  pull_request:
    # only PRs that merge into dev trigger the bump step
    branches: [ dev ]
    paths:
      - '**/*.cpp'
      - 'test/src/quick_fuzz_tests/fuzz_config.json'
      - '.github/workflows/fuzz.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # we need the PR branch to be writeable for the bump
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build jq

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure | tee ctest.log

      # Save artefacts if tests fail
      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quick-fuzz-failure-${{ github.run_id }}
          path: |
            tmp/fls_quick_fuzz/**
            ctest.log

      # --- Seed bump inside the PR branch ----------------------------------
      - name: Bump base_seed in PR branch
        if: |
          success() && github.event_name == 'pull_request' && github.base_ref == 'dev'
        env:
          CONFIG: test/src/quick_fuzz_tests/fuzz_config.json
        run: |
          # Stop if we already bumped in this PR (commit msg contains [seed bump])
          git log -1 --pretty=%s | grep -q '\[seed bump\]' && {
            echo "Seed already bumped in latest commit – skipping.";
            exit 0;
          }

          git config --global user.name  "CI Bot"
          git config --global user.email "ci@users.noreply.github.com"

          BASE=$(jq '.base_seed' "$CONFIG")
          NEXT=$((BASE + 1))
          echo "Bumping seed $BASE → $NEXT"

          jq --argjson seed $NEXT '.base_seed = $seed' "$CONFIG" > "$CONFIG.tmp" && mv "$CONFIG.tmp" "$CONFIG"

          git add "$CONFIG"
          git commit -m "CI: bump quick-fuzz base_seed → $NEXT [seed bump] [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
