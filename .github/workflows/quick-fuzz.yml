name: Quick-Fuzz CI
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) — 
  ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
    branches: [ '**' ]
  pull_request:
    # only PRs that merge into dev trigger the failure comment step
    branches: [ dev ]
    paths:
      - '**/*.cpp'
      - 'test/src/quick_fuzz_tests/fuzz_config.json'
      - '.github/workflows/fuzz.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build jq

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure | tee ctest.log

      # ---------------------------------------------------------------------
      # Save artifacts if tests fail
      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quick-fuzz-failure-${{ github.run_id }}
          path: |
            tmp/fls_quick_fuzz/**
            ctest.log

      # ---------------------------------------------------------------------
      # Comment on the PR when tests fail, linking to artifacts, schema, and log snippet
      - name: Comment on failure
        if: ${{ failure() && github.event_name == 'pull_request' && github.base_ref == 'dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CONFIG_PATH: test/src/quick_fuzz_tests/fuzz_config.json
        run: |
          # Construct URLs
          ARTIFACTS_PAGE="https://${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts"
          SCHEMA_URL="https://${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/${CONFIG_PATH}"
          ERROR_SNIPPET=$(tail -n 20 ctest.log | sed 's/"/\\"/g')

          # Post a comment on the PR
          gh pr comment $PR_NUMBER --body $'## ❌ Quick-Fuzz CI Failed\n\n'\
  $'**Download failure artifacts:** [Logs & CSV]('"$ARTIFACTS_PAGE"')\n\n'\
  $'**Fuzz config schema:** ['"$CONFIG_PATH"']('"$SCHEMA_URL"')\n\n'\
  $'**Last 20 lines of test log:**\n```\n'"$ERROR_SNIPPET"$'\n```'
