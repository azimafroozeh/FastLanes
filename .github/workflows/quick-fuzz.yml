name: Quick-Fuzz CI
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) — 
  ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ dev ]
    paths:
      - '**/*.cpp'
      - 'test/src/quick_fuzz_tests/fuzz_config.json'
      - '.github/workflows/quick-fuzz.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2) Dependencies
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build jq

      # 3) Configure
      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDFLS_BUILD_TESTING=ON

      # 4) Build
      - name: Build
        run: cmake --build build

      # 5) Test (only the QuickFuzz test)
      - name: Run Quick-Fuzz Only
        run: |
          # Only run tests whose name matches "QuickFuzz"
          ctest --test-dir build -R QuickFuzz --output-on-failure | tee ctest.log

      # 6) Upload artifacts on failure
      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quick-fuzz-failure-${{ github.run_id }}
          path: |
            tmp/fls_quick_fuzz/**
            ctest.log

      # 7) Comment on the PR when tests fail
      - name: Comment on failure
        if: ${{ failure() && github.event_name == 'pull_request' && github.base_ref == 'dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUMBER='${{ github.event.pull_request.number }}'
          RUN_ID='${{ github.run_id }}'
          CONFIG_PATH='test/src/quick_fuzz_tests/fuzz_config.json'

          ARTIFACTS_PAGE="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts"
          SCHEMA_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/${CONFIG_PATH}"
          ERROR_SNIPPET=$(tail -n 20 ctest.log)

          body=$(printf '%s\n' \
            '## ❌ Quick-Fuzz CI Failed' \
            '' \
            "**Download failure artifacts:** [Logs & CSV](${ARTIFACTS_PAGE})" \
            '' \
            "**Fuzz config schema:** [${CONFIG_PATH}](${SCHEMA_URL})" \
            '' \
            '**Last 20 lines of test log:**' \
            '```' \
            "${ERROR_SNIPPET}" \
            '```')

          gh pr comment "${PR_NUMBER}" --body "${body}"
