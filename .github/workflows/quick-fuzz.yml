name: Quick-Fuzz CI
on:
  pull_request:
    branches: [ dev ]
    paths:
      - '**/*.cpp'
      - 'test/src/quick_fuzz_tests/fuzz_config.json'
      - '.github/workflows/quick-fuzz.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout YOUR branch head, not the merge to dev
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      # 2) Install deps
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build jq

      # 3) Configure
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFLS_BUILD_TESTING=ON

      # 4) Build
      - name: Build
        run: cmake --build build -- -j$(nproc)

      # 5) Test (QuickFuzz only, verbose)
      - name: Run Quick-Fuzz Only
        run: |
          ctest --test-dir build \
                -R QuickFuzz \
                --parallel $(nproc) \
                --output-on-failure \
                -V | tee ctest.log

      # 6) Upload artifacts on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: quick-fuzz-failure-${{ github.run_id }}
          path: |
            tmp/fls_quick_fuzz/**
            ctest.log

      # 7) Comment on failure
      - name: Comment on failure
        if: ${{ failure() && github.event_name == 'pull_request' && github.base_ref == 'dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # (unchanged)
