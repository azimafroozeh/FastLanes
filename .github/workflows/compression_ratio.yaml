name: COMPRESSION RATIO
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) —
  ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
  pull_request:
    branches: [ main, dev ]

jobs:
  bench_compression_ratio:
    runs-on: macos-latest

    steps:
      # 1) Check out this commit
      - name: Checkout current commit
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2) Install LLVM toolchain
      - name: Install LLVM
        uses: ./.github/actions/install-llvm

      # 3) Clone the dev branch for baseline
      - name: Clone dev branch
        run: |
          git clone --branch dev https://github.com/${{ github.repository }} code-dev

      # 4) Detect CPU count
      - name: Detect CPU count
        run: echo "BUILD_THREADS=$(nproc)" >> "$GITHUB_ENV"

      # 5) Build & run the baseline (dev)
      - name: Build & extract baseline (dev)
        run: |
          cd code-dev
          mkdir -p build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFLS_BUILD_BENCHMARKING=ON \
            -DFLS_ENABLE_INSTALL=OFF \
            ..
          cmake --build . --parallel "$BUILD_THREADS" --target bench_compression_ratio
          # Merge every compression_summary.csv into one file
          { \
            first=1; \
            for f in $(find benchmark/result/compression_ratio -name compression_summary.csv); do \
              if [ $first -eq 1 ]; then cat "$f" > "$GITHUB_WORKSPACE/dev-compression.csv"; first=0; \
              else tail -n +2 "$f" >> "$GITHUB_WORKSPACE/dev-compression.csv"; fi; \
            done; \
          }

      # 6) Build & run the benchmarks for this commit
      - name: Build & extract current (this commit)
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFLS_BUILD_CLI=OFF \
            -DFLS_BUILD_TESTING=OFF \
            -DFLS_BUILD_BENCHMARKING=ON \
            -DFLS_ENABLE_INSTALL=OFF \
            ..
          cmake --build . --parallel "$BUILD_THREADS" --target bench_compression_ratio
          { \
            first=1; \
            for f in $(find benchmark/result/compression_ratio -name compression_summary.csv); do \
              if [ $first -eq 1 ]; then cat "$f" > "$GITHUB_WORKSPACE/curr-compression.csv"; first=0; \
              else tail -n +2 "$f" >> "$GITHUB_WORKSPACE/curr-compression.csv"; fi; \
            done; \
          }

      # 7) Upload raw CSVs for inspection
      - name: Upload raw CSVs
        if: ${{ failure() || github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: compression-csvs
          path: |
            dev-compression.csv
            curr-compression.csv

      # 8) Python for the Makefile post-processing
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 9) Generate the Markdown regression report
      - name: Generate compression report via Makefile
        run: |
          make -f mk/compression_report.mk \
            BASELINE="$GITHUB_WORKSPACE/dev-compression.csv" \
            CURRENT="$GITHUB_WORKSPACE/curr-compression.csv" \
            REPORT=report.md

      # 10) Comment the regression table back to the PR
      - name: Comment compression regression table
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: report.md
