name: COMPRESSION RATIO
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }}) — ${{ github.event.pull_request.title || github.event.head_commit.message }}
on:
  push:
  pull_request:
    branches:
      - main
      - dev

jobs:
  bench_compression_ratio:
    runs-on: macos-latest

    steps:
      # 1) Checkout the current commit
      - name: Checkout current commit
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2) Install LLVM
      - name: Install LLVM
        uses: ./.github/actions/install-llvm

      # 3) Clone dev branch for baseline
      - name: Clone dev branch
        run: |
          git clone --branch dev https://github.com/${{ github.repository }} code-dev

      # 4) Detect CPU count for parallel builds
      - name: Detect CPU count
        run: echo "BUILD_THREADS=$(nproc)" >> $GITHUB_ENV

      # 5) Build & extract baseline (dev)
      - name: Build & extract baseline (dev)
        id: baseline
        run: |
          cd code-dev
          mkdir -p build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFLS_BUILD_BENCHMARKING=ON \
            -DFLS_ENABLE_INSTALL=OFF \
            ..
          cmake --build . --parallel $BUILD_THREADS --target bench_compression_ratio
          cp benchmark/result/compression_ratio/tpch/fastlanes.csv $GITHUB_WORKSPACE/dev-compression.csv

      # 6) Build & extract current (this commit)
      - name: Build & extract current (this commit)
        id: current
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFLS_BUILD_CLI=OFF \
            -DFLS_BUILD_TESTING=OFF \
            -DFLS_BUILD_BENCHMARKING=ON \
            -DFLS_ENABLE_INSTALL=OFF \
            ..
          cmake --build . --parallel $BUILD_THREADS --target bench_compression_ratio
          cp benchmark/result/compression_ratio/tpch/fastlanes.csv $GITHUB_WORKSPACE/curr-compression.csv

      # 7) Upload raw CSVs for artifacts or failure inspection
      - name: Upload raw CSVs
        if: ${{ failure() || github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: compression-csvs
          path: |
            dev-compression.csv
            curr-compression.csv

      # 8) Set up Python (needed by the Makefile recipe)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 9) Generate the Markdown report via your Makefile
      - name: Generate compression report via Makefile
        run: |
          make -f mk/compression_report.mk \
            BASELINE=dev-compression.csv \
            CURRENT=curr-compression.csv \
            REPORT=report.md

      # 10) Comment the regression table back to the PR
      - name: Comment compression regression table
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: report.md
