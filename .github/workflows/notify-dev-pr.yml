name: Notify Discord on PR Merge to Dev

on:
  pull_request_target:
    types: [ closed ]
    branches: [ dev ]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Build JSON payload
        id: build
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          AUTHOR: ${{ github.event.pull_request.merged_by.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          msg="🔔 FastLanes update:\n**PR #${PR_NUM} – ${PR_TITLE}** was merged into dev by ${AUTHOR}.\n🔗 ${PR_URL}\n\n**PR description:**\n${PR_BODY}"
          payload=$(jq -Rn -c --arg content "$msg" '{content:$content}')
          echo "json=$payload" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "${{ steps.build.outputs.json }}" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
