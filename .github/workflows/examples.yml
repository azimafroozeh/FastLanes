name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - dev

jobs:
  fetch-content:
    name: 💎 CMake / FetchContent example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # fetch full history so FetchContent can checkout arbitrary SHAs
          fetch-depth: 0

      - name: Install LLVM
        uses: ./.github/actions/install-llvm

      - name: Configure & build fetch_content_example
        working-directory: examples/fetch_content_example
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DFASTLANES_TAG=${{ github.event.pull_request.head.sha || github.sha }} 
          cmake --build . --parallel

      - name: Run C++ example
        working-directory: examples/fetch_content_example/build
        run: ./example

  python:
    name: 🐍 Python example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Python example
        run: python python_example.py

  rust:
    name: 🦀 Rust example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: stable

      - name: Run Rust tests
        run: cargo test --verbose
