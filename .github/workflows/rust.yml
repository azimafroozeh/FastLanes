# .github/workflows/rust.yml
# ────────────────────────────────────────────────────────────────
name: Rust
run-name: >
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
  pull_request:
    branches: [ "main", "dev" ]

# cancel redundant runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────
# 1️⃣  Rust format check
# ────────────────────────────────────────────────────────────────
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect CPU count
        run: make detect-cpu | tee -a "$GITHUB_ENV"

      - name: Check Rust formatting
        working-directory: rust
        run: cargo fmt -- --check

  # ────────────────────────────────────────────────────────────────
  # 2️⃣  Build, test, dry-run publish (Clang 20 + libc++)
  # ────────────────────────────────────────────────────────────────
  build:
    needs: [ fmt ]
    runs-on: ubuntu-latest

    # All steps inherit these
    env:
      CC: clang
      CXX: clang++
      # use LLD for faster links; cargo picks this up via RUSTFLAGS
      RUSTFLAGS: -C link-arg=-fuse-ld=lld

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect CPU count
        run: make detect-cpu | tee -a "$GITHUB_ENV"

      # Cache Cargo registry + Git + build artefacts
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/debug/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ① Install the LLVM 20 compiler/linker suite (composite action)
      - name: Install LLVM 20 toolchain
        uses: ./.github/actions/install-llvm

      # ② Bring in libc++, libunwind, compiler-rt, CMake, Make, pkg-config  (Linux only)
      - name: Install libc++ runtime & build tools (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
              libc++-20-dev      \
              libc++abi-20-dev   \
              libunwind-20-dev   \
              libclang-rt-20-dev \
              cmake make pkg-config

      # ─────────── Build & run the bundled example ───────────
      - name: Build & run Rust example
        run: make -j $BUILD_THREADS run-rust-example

      # ─────────── Run the Rust test suite ───────────
      - name: Run Rust tests
        run: |
          cd rust
          cargo test -- --test-threads $BUILD_THREADS

      # ─────────── crates.io dry-run publish ───────────
      - name: Dry-run publish check
        run: make -j $BUILD_THREADS dry-run-rust

# ────────────────────────────────────────────────────────────────
# 3️⃣  (Optional) Post-build stages go here, e.g. docs deployment
