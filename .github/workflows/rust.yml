# .github/workflows/rust.yml
# ────────────────────────────────────────────────────────────────
name: Rust
run-name: >
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
  pull_request:
    branches: [ "main", "dev" ]

# Cancel redundant runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────  1️⃣ rustfmt  ──────────────────────────
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make detect-cpu | tee -a "$GITHUB_ENV"
      - working-directory: rust
        run: cargo fmt -- --check

  # ────────────────────────  2️⃣ build & test  ───────────────────────
  build:
    needs: fmt
    runs-on: ubuntu-latest

    env:
      # compile C/C++ with Clang
      CC: clang
      CXX: clang++
      #  ⇢ keep warnings but *not* fatal on Clang
      #  ⇢ downgrade any future unknown-option warnings as well
      CXXFLAGS: -Wno-error -Wno-error=unknown-warning-option
      # link Rust with LLD (stable flag only)
      RUSTFLAGS: -C link-arg=-fuse-ld=lld

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - run: make detect-cpu | tee -a "$GITHUB_ENV"

      # cache Cargo artefacts
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/debug/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ① LLVM 20 toolchain (local composite action)
      - name: Install LLVM 20
        uses: ./.github/actions/install-llvm

      # ② libc++ runtime + build helpers (Linux only)
      - name: Install libc++ runtime & build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libc++-20-dev libc++abi-20-dev libunwind-20-dev libclang-rt-20-dev \
            cmake make pkg-config

      # Build & run the bundled Rust example
      - name: Build & run Rust example
        run: make -j $BUILD_THREADS run-rust-example

      # Run the Rust unit tests
      - name: Rust tests
        run: |
          cd rust
          cargo test -- --test-threads $BUILD_THREADS

      # crates-io dry-run publish
      - name: Dry-run publish
        run: make -j $BUILD_THREADS dry-run-rust

# ────────────────────────  3️⃣  (optional)  ───────────────────────
