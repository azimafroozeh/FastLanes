name: CUDA (native + president-docker)

run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on: [ push ]

permissions:
  contents: read      # checkout only

# ──────────────────────────────────────────────────────────────
jobs:
  # 1️⃣ Native matrix build (president + ttt)
  build:
    strategy:
      fail-fast: false
      matrix:
        runnerLabel: [ president, ttt ]

    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.runnerLabel }}

    name: Native build on ${{ matrix.runnerLabel }}

    steps:
      - uses: actions/checkout@v3
        with: { fetch-depth: 0 }

      - name: 🔎 Env dump
        run: |
          set -x
          hostname
          echo "Matrix label :" ${{ matrix.runnerLabel }}
          which nvidia-smi || true
          which nvcc       || true
          which cmake      || true

      - name: ✅ Verify tools
        run: |
          for cmd in nvidia-smi nvcc cmake; do
            command -v "$cmd" >/dev/null || { echo "::error::$cmd missing"; exit 127; }
          done
          nvidia-smi
          nvcc   --version
          cmake  --version

      - name: ⚙️ Configure
        run: cmake -S . -B build -DFLS_BUILD_GPU=ON

      - name: 🛠️ Build
        run: cmake --build build -- -j"$(nproc)"

      - name: 🚀 Smoke-test
        run: ./build/cuda_info_dummy