name: CUDA
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on: [ push ]

jobs:
  build:
    if: github.actor == 'azimafroozeh'

    strategy:
      fail-fast: false
      matrix:
        runnerLabel: [ president, ttt ]

    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.runnerLabel }}

    name: Build on ${{ matrix.runnerLabel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify CUDA & GPU
        run: |
          nvidia-smi
          nvcc --version

      - name: Configure CMake
        run: |
          cmake -S . -B build -DFLS_BUILD_GPU=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run CUDA Info
        # prints GPU properties gathered by your binary
        run: ./build/cuda_info_dummy
