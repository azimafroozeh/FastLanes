name: CUDA
on: [ push ]

permissions:
  contents: read

jobs:
  build:
    if: github.actor == 'azimafroozeh'

    strategy:
      fail-fast: false
      matrix:
        runnerLabel: [ president, ttt ]

    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.runnerLabel }}

    name: Build on ${{ matrix.runnerLabel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Debug runner environment
        run: |
          echo "🏷️  Hostname: $(hostname)"
          echo "🏷️  Matrix label: ${{ matrix.runnerLabel }}"
          echo "🔍  PATH = $PATH"
          echo "🔍  which nvidia-smi: $(which nvidia-smi || echo 'NOT FOUND')"
          echo "🔍  which nvcc: $(which nvcc || echo 'NOT FOUND')"

      - name: Verify CUDA & GPU
        run: |
          # Fail fast if nvidia-smi or nvcc are missing
          if ! command -v nvidia-smi >/dev/null; then
            echo "Error: nvidia-smi not found. Make sure CUDA drivers are installed on this runner."
            exit 1
          fi
          if ! command -v nvcc >/dev/null; then
            echo "Error: nvcc not found. Make sure the CUDA toolkit is installed on this runner."
            exit 1
          fi
          nvidia-smi
          nvcc --version

      - name: Configure CMake
        run: |
          cmake -S . -B build -DFLS_BUILD_GPU=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run CUDA Info
        run: ./build/cuda_info_dummy
