name: CUDA
run-name: >-
  ${{ github.workflow }} on ${{ github.ref_name }} (#${{ github.run_number }})
  — ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runnerLabel: [ president, ttt ]

    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.runnerLabel }}

    name: Build on ${{ matrix.runnerLabel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Debug runner environment
        run: |
          echo "🏷️  Hostname: $(hostname)"
          echo "🏷️  Matrix label: ${{ matrix.runnerLabel }}"
          echo "👥  Groups: $(groups)"
          echo "🔍  which nvidia-smi: $(which nvidia-smi || echo 'NOT FOUND')"
          echo "🔍  which nvcc:      $(which nvcc      || echo 'NOT FOUND')"

      - name: Verify CUDA & GPU
        run: |
          if ! command -v nvidia-smi >/dev/null; then
            echo "❌ nvidia-smi not found—install CUDA drivers on this runner"
            exit 1
          fi
          if ! command -v nvcc >/dev/null; then
            echo "❌ nvcc not found—install CUDA toolkit on this runner"
            exit 1
          fi
          nvidia-smi
          nvcc --version

      - name: Configure CMake
        run: cmake -S . -B build -DFLS_BUILD_GPU=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run CUDA Info
        run: ./build/cuda_info_dummy
