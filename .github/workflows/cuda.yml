name: CUDA (native matrix)

# ─────────────────────────────────────────────────────────────────────────────
# Triggers ─ any push to any branch
# ─────────────────────────────────────────────────────────────────────────────
on: [push]

permissions:
  contents: read        # read-only is enough for checkout

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    # Run once on “president” and once on “ttt”
    strategy:
      fail-fast: false
      matrix:
        runnerLabel: [president, ttt]

    # Match the runner by its custom label
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.runnerLabel }}

    name: Build on ${{ matrix.runnerLabel }}

    steps:
      # ───── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ───── 2. Debug environment ──────────────────────────────────────────
      - name: 🔎 Dump runner environment
        id: envdump
        run: |
          set -x
          echo "Runner hostname : $(hostname)"
          echo "Matrix label    : ${{ matrix.runnerLabel }}"
          echo "Current user    : $(whoami)"
          echo "PATH            : $PATH"
          echo "Groups          : $(groups)"
          
          # Show locations (or absence) of critical tools
          which nvidia-smi || true
          which nvcc       || true
          which cmake      || true

      # ───── 3. Sanity checks ───────────────────────────────────────────────
      - name: ✅ Verify required tools exist
        run: |
          missing=""
          for cmd in nvidia-smi nvcc cmake; do
            if ! command -v "$cmd" >/dev/null; then
              echo "::error::'$cmd' is missing on this runner."
              missing="yes"
            fi
          done
          if [ "$missing" = "yes" ]; then
            echo "❌ Required tools missing. Install them on runner '${{ matrix.runnerLabel }}' and re-run."
            exit 127
          fi
          
          # Quick driver / compiler info
          nvidia-smi
          nvcc --version
          cmake --version

      # ───── 4. Configure & build ───────────────────────────────────────────
      - name: ⚙️  Configure CMake
        run: cmake -S . -B build -DFLS_BUILD_GPU=ON

      - name: 🛠️  Build project
        run: cmake --build build -- -j"$(nproc)"

      # ───── 5. Smoke-test binary (optional) ───────────────────────────────
      - name: 🚀 Run CUDA Info
        run: ./build/cuda_info_dummy
