name: Build & Test Python Wheels

on:
  # Build wheels for every push to default branch and on version tags (vX.Y.Z)
  push:
    branches: [ main, master ]
    tags:     [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:

jobs:
  build_wheels:
    name: ${{ matrix.os }} • ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false            # keep going if one wheel fails
      matrix:
        os:     [ubuntu-latest, macos-latest, windows-latest]
        python: ["cp38", "cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - uses: actions/checkout@v4

      # CIBW needs a Python just to run itself; we use the “build” environment python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install cibuildwheel
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==2.* numpy  # numpy is an optional before-build dep

      # Build + test wheels
      - name: Build wheels with cibuildwheel
        env:
          # Build only the CPython variant for the current matrix entry
          CIBW_BUILD: ${{ matrix.python }}-*
          # Supply any build-time Python deps (NumPy for include dirs)
          CIBW_BEFORE_BUILD: "python -m pip install numpy>=2.0"
          # Quick sanity test: round-trip 10 ints
          CIBW_TEST_COMMAND: |
            python - << 'PY'
            import fastlanes as fl, numpy as np
            a = np.arange(10, dtype=np.uint32)
            assert (a == fl.decompress(fl.compress(a), len(a))).all()
            print("Round-trip test OK")
            PY
          # Wheel-house output location
          CIBW_OUTPUT_DIR: wheelhouse
          # On macOS cross-compile both x86_64 and arm64 into universal2 wheels
          CIBW_ARCHS_MACOS: universal2
          # For Linux arm64 wheel build we rely on the docker image chosen by cibuildwheel
          # If you don't want arm64 on Linux, change to "x86_64"
        run: |
          cibuildwheel .

      # Upload wheels as artifacts (so PR reviewers can download/test)
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-$
