name: Install LLVM Toolchain
description: Cross-platform LLVM installer for macOS, Ubuntu and Windows runners

inputs:
  version: # major or full version string, e.g. “20” or “19.0.0”
    description: "LLVM/Clang version to install"
    default: "20"

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ inputs.version }}"
        MAJOR="${VERSION%%.*}"

        echo "🟣 Installing LLVM/Clang ${VERSION} on ${{ runner.os }}"

        if [[ "${{ runner.os }}" == "macOS" ]]; then
          # Homebrew keeps every major release in a separate formula
          brew install llvm@${MAJOR}
          echo "/opt/homebrew/opt/llvm@${MAJOR}/bin" >> "$GITHUB_PATH"

        elif [[ "${{ runner.os }}" == "Linux" ]]; then
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg

          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] \
            http://apt.llvm.org/${UBUNTU_CODENAME}/ \
            llvm-toolchain-${UBUNTU_CODENAME}-${MAJOR} main" | \
            sudo tee /etc/apt/sources.list.d/llvm${MAJOR}.list

          sudo apt-get update -y
          sudo apt-get install -y clang-${MAJOR} clang++-${MAJOR} clang-tidy-${MAJOR} lld-${MAJOR}

          sudo update-alternatives --install /usr/bin/clang      clang      /usr/bin/clang-${MAJOR}       200
          sudo update-alternatives --install /usr/bin/clang++    clang++    /usr/bin/clang++-${MAJOR}     200
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-${MAJOR}  200

          echo "/usr/lib/llvm-${MAJOR}/bin" >> "$GITHUB_PATH"

        elif [[ "${{ runner.os }}" == "Windows" ]]; then
          # Chocolatey currently carries LLVM 13-19; use 19 if caller asked for <19, else MAJOR
          CHOCO_VER="${VERSION}"
          if [[ "${MAJOR}" -lt 19 ]]; then
            CHOCO_VER="19.0.0"
          fi
          choco install llvm --version=${CHOCO_VER} -y --no-progress
          echo "/c/Program Files/LLVM/bin" | sed 's# #\\ #g' >> "$GITHUB_PATH"

        else
          echo "::warning ::LLVM installation not supported on ${{ runner.os }}"
        fi
